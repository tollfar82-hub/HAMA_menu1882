name: Build Dylib
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Theos
      uses: theos/theos-action@v1

    - name: Build Tweak
      run: |
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ModMenu-Dylib
        path: .theos/obj/**/*.dylib
